      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+-**"
      - "[0-9]+.[0-9]+.[0-9]+-**"

  workflow_dispatch:

jobs:

  CI:
    uses: SkylineCommunications/_ReusableWorkflows/.github/workflows/Internal NuGet Solution Master Workflow.yml@test-downstream
    with:
      sonarCloudProjectName: SkylineCommunications_BOOST-DailyRegression-InternalNuGet
    secrets:
      nugetApiKey: ${{ secrets.NUGETAPIKEY_GITHUB }}