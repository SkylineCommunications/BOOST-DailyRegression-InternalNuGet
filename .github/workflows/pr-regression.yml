name: Test PR Reusable Workflow Regression

on:
  repository_dispatch:
    types: [test-reusable-workflow]

jobs:
  regression:
    uses: SkylineCommunications/BOOST-DailyRegression/.github/workflows/regression.yml@main
    with:
      workflow-name: pr-ci-cd.yml
      job-number: 0
    secrets:
      msteams-webhook: ${{ secrets.TEAMS_WEBHOOK }}
  regression-oidc:
    needs: regression
    uses: SkylineCommunications/BOOST-DailyRegression/.github/workflows/regression.yml@main
    with:
      workflow-name: pr-ci-cd-oidc.yml
      job-number: 1
    secrets:
      msteams-webhook: ${{ secrets.TEAMS_WEBHOOK }}
